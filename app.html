<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planexa App</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      padding: 10px;
    }

    .todo-app {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      color: white;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #38bdf8;
    }

    /* INPUT AREA */
    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input, button {
      border: none;
      outline: none;
      border-radius: 20px;
      padding: 10px;
    }

    #task-input {
      flex: 1;
    }

    #task-time {
      width: 120px;
    }

    button {
      background: #38bdf8;
      cursor: pointer;
    }

    /* TASK LIST */
    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.08);
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      gap: 10px;
    }

    .completed {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .task-time {
      font-size: 0.8rem;
      color: #cbd5f5;
    }

    .delete-btn {
      cursor: pointer;
      background: none;
    }

    /* EMPTY IMAGE */
    .empty-image {
      display: block;
      margin: 20px auto;
      height: 150px;
      opacity: 0.6;
    }

    /* 📱 RESPONSIVE DESIGN */
    @media (max-width: 768px) {

      .input-area {
        flex-direction: column;
      }

      #task-time {
        width: 100%;
      }

      input, button {
        width: 100%;
      }

      li {
        flex-direction: column;
        align-items: flex-start;
      }

      h1 {
        font-size: 1.5rem;
      }
    }

  </style>
</head>

<body>

<div class="todo-app">
  <h1>PLANEXA</h1>

  <form class="input-area">
    <input type="text" id="task-input" placeholder="Add Task...">
    <input type="time" id="task-time">
    <button type="submit">+</button>
  </form>

  <ul id="task-list"></ul>

  <!-- 📋 EMPTY STATE IMAGE -->
  <img class="empty-image" src="./clipboard.png" alt="empty">
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const taskInput = document.getElementById('task-input');
  const taskTime = document.getElementById('task-time');
  const taskList = document.getElementById('task-list');
  const emptyImage = document.querySelector('.empty-image');

  /* SHOW / HIDE IMAGE */
  function toggleEmptyState() {
    emptyImage.style.display =
      taskList.children.length === 0 ? 'block' : 'none';
  }

  /* SAVE */
  function saveTasks() {
    localStorage.setItem('tasks', taskList.innerHTML);
  }

  /* LOAD */
  function loadTasks() {
    taskList.innerHTML = localStorage.getItem('tasks') || '';

    document.querySelectorAll('.checkbox').forEach(cb => {
      cb.addEventListener('change', handleCheck);
    });

    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', deleteTask);
    });

    toggleEmptyState();
  }

  /* COMPLETE */
  function handleCheck(e) {
    const text = e.target.parentElement.querySelector('.task-text');
    text.classList.toggle('completed');
    saveTasks();
  }

  /* DELETE */
  function deleteTask(e) {
    e.target.parentElement.remove();
    saveTasks();
    toggleEmptyState();
  }

  /* ADD TASK */
  document.querySelector('.input-area').addEventListener('submit', (e) => {
    e.preventDefault();

    const text = taskInput.value.trim();
    const time = taskTime.value;

    if (!text) return;

    const li = document.createElement('li');

    li.innerHTML = `
      <input type="checkbox" class="checkbox">
      <span class="task-text">${text}</span>
      <span class="task-time">${time}</span>
      <button class="delete-btn">🗑️</button>
    `;

    li.querySelector('.checkbox').addEventListener('change', handleCheck);
    li.querySelector('.delete-btn').addEventListener('click', deleteTask);

    taskList.appendChild(li);

    taskInput.value = '';
    taskTime.value = '';

    saveTasks();
    toggleEmptyState();
  });

  loadTasks();
});
</script>

</body>
</html>
